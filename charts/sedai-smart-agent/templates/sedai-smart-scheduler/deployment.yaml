{{- if .Values.sedaiSmartScheduler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "smart-scheduler.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "smart-scheduler.labels" . | nindent 4 }}
    app: sedai-smart-scheduler
spec:
  replicas: {{ .Values.sedaiSmartScheduler.replicaCount }}
  selector:
    matchLabels:
      app: sedai-smart-scheduler
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "smart-scheduler.selectorLabels" . | nindent 8 }}
        app: sedai-smart-scheduler
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/sedai-smart-scheduler/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "smart-scheduler.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.sedaiSmartScheduler.podSecurityContext | nindent 8 }}
      containers:
        - name: kube-scheduler
          image: "{{ include "sedai-smart-agent.imageRepository" (dict "globalRegistry" .Values.globalRegistry "repository" .Values.sedaiSmartScheduler.image.repository) }}:{{ include "smart-scheduler.imageTag" . }}"
          imagePullPolicy: {{ .Values.sedaiSmartScheduler.image.pullPolicy }}
          command:
            - kube-scheduler
            - --config=/etc/kubernetes/scheduler-config.yaml
            - --v={{ .Values.sedaiSmartScheduler.scheduler.verbosity }}
          ports:
            - name: https
              containerPort: 10259
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 10259
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 10259
              scheme: HTTPS
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.sedaiSmartScheduler.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.sedaiSmartScheduler.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/kubernetes
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "smart-scheduler.fullname" . }}-config
      {{- with .Values.sedaiSmartScheduler.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if gt (len .Values.sedaiSmartScheduler.affinity) 0 }}
      affinity:
        {{- toYaml .Values.sedaiSmartScheduler.affinity | nindent 8 }}
      {{- else if gt (int .Values.sedaiSmartScheduler.replicaCount) 1 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: sedai-smart-scheduler
                topologyKey: kubernetes.io/hostname
      {{- end }}
      {{- with .Values.sedaiSmartScheduler.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
