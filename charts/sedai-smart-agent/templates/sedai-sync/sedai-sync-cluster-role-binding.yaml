{{- if or .Values.sedaiSync.enabled .Values.kubeflowSparkOptimization.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: "{{ .Values.workload.kubeSpecController.name }}-role-binding"
  labels:
    {{- include "sedai-smart-agent.labels" . | nindent 4 }}
    {{- with .Values.globalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.globalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: "{{ .Values.workload.kubeSpecController.name }}-role"
subjects:
- kind: ServiceAccount
  name: "{{ .Values.workload.kubeSpecController.name }}-sa"
  namespace: {{ .Release.Namespace }}
{{- end }}
