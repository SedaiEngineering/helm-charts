{{- if and .Values.sedaiSmartScheduler.enabled .Values.sedaiSmartScheduler.logForwarder.enabled }}
# Fluent Bit config for the scheduler pod — tails scheduler.log and ships to Loki.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "smart-scheduler.fullname" . }}-log-forwarder-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "smart-scheduler.labels" . | nindent 4 }}
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush            5
        Daemon           Off
        Log_Level        warn

    [INPUT]
        Name             tail
        Path             /logs/scheduler.log
        Tag              scheduler
        Refresh_Interval 5
        Skip_Long_Lines  On

    [OUTPUT]
        Name             loki
        Match            scheduler
        Host             ${LOKI_HOST}
        Port             ${LOKI_PORT}
        TLS              On
        TLS.Verify       On
        Http_User        ${LOKI_USERNAME}
        Http_Passwd      ${LOKI_PASSWORD}
        Labels           container_name=sedai-smart-scheduler,tenant=${AGENT_TENANT},account_id=${AGENT_ACCOUNTID}
        Line_Format      json
        Auto_Kubernetes_Labels off
{{- if .Values.sedaiSmartScheduler.compactor.enabled }}
---
# Fluent Bit config for the compactor pod — tails compactor.log and ships to Loki.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.workload.smartCompactor.name | default "sedai-smart-compactor" }}-log-forwarder-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "smart-scheduler.labels" . | nindent 4 }}
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush            5
        Daemon           Off
        Log_Level        warn

    [INPUT]
        Name             tail
        Path             /logs/compactor.log
        Tag              compactor
        Refresh_Interval 5
        Skip_Long_Lines  On

    [OUTPUT]
        Name             loki
        Match            compactor
        Host             ${LOKI_HOST}
        Port             ${LOKI_PORT}
        TLS              On
        TLS.Verify       On
        Http_User        ${LOKI_USERNAME}
        Http_Passwd      ${LOKI_PASSWORD}
        Labels           container_name=sedai-smart-compactor,tenant=${AGENT_TENANT},account_id=${AGENT_ACCOUNTID}
        Line_Format      json
        Auto_Kubernetes_Labels off
{{- end }}
{{- end }}
