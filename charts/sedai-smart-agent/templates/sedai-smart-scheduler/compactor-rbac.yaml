# Compactor RBAC: grants the smart-agent SA pods/eviction:create so the descheduler
# can call the polite (PDB-respecting) eviction API.
{{- if and .Values.sedaiSmartScheduler.enabled .Values.sedaiSmartScheduler.rbac.create .Values.sedaiSmartScheduler.compactor.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "smart-scheduler.fullname" . }}-compactor-eviction
  labels:
    {{- include "smart-scheduler.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "smart-scheduler.fullname" . }}-compactor-eviction
  labels:
    {{- include "smart-scheduler.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "smart-scheduler.fullname" . }}-compactor-eviction
subjects:
  - kind: ServiceAccount
    name: {{ include "smart-scheduler.serviceAccountName" . }}
    namespace: {{ include "smart-scheduler.serviceAccountNamespace" . }}
{{- end }}
