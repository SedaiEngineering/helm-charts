{{- if .Values.sedaiPrometheus.enabled }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    {{- include "sedai-smart-agent.labels" . | nindent 4 }}
    {{- with .Values.globalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.globalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  name: "{{ .Values.workload.prometheus.name }}-configmap"
  namespace: {{ .Release.Namespace }}
data:
  allow-snippet-annotations: "false"
  alerting_rules.yml: |
    {}
  alerts: |
    {}
  prometheus.yml: |
    global:
      evaluation_interval: 1m
      scrape_interval: 1m
      scrape_timeout: 3s
    rule_files:
      - /etc/config/recording_rules.yml
      - /etc/config/alerting_rules.yml
      - /etc/config/rules
      - /etc/config/alerts
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090
        metric_relabel_configs:
          - action: keep
            regex: prometheus_build_info|prometheus_config_last_reload_success_timestamp_seconds|prometheus_ready
            source_labels: [__name__]
      - job_name: kubernetes-nodes-cadvisor
        scrape_interval: 1m
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - replacement: kubernetes.default.svc:443
            target_label: __address__
          - regex: (.+)
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
            source_labels:
              - __meta_kubernetes_node_name
            target_label: __metrics_path__
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        metric_relabel_configs:
          - action: keep
            regex: container_cpu_cfs_periods_total|container_cpu_cfs_throttled_periods_total|container_cpu_cfs_throttled_seconds_total|container_cpu_system_seconds_total|container_cpu_usage_seconds_total|container_cpu_user_seconds_total|container_fs_io_time_seconds_total|container_fs_io_time_weighted_seconds_total|container_memory_cache|container_memory_failcnt|container_memory_failures_total|container_memory_max_usage_bytes|container_memory_rss|container_memory_swap|container_memory_usage_bytes|container_memory_working_set_bytes|container_network_receive_bytes_total|container_network_receive_errors_total|container_network_receive_packets_dropped_total|container_network_transmit_bytes_total|container_network_transmit_errors_total|container_network_transmit_packets_dropped_total|container_spec_cpu_period|container_spec_cpu_quota|container_spec_memory_limit_bytes
            source_labels: [__name__]
          - action: drop
            regex: ^$
            source_labels: [container]
          - action: labeldrop
            regex: id
          - action: labeldrop
            regex: image
          - action: labeldrop
            regex: name
      # Dedicated job for Kube State Metrics
      - job_name: kube-state-metrics
        scrape_interval: 1m
        honor_labels: true
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          # Only scrape KSM in this release's namespace
          - action: keep
            source_labels:
              - __meta_kubernetes_namespace
            regex: {{ .Release.Namespace }}
          # Check for prometheus.io/scrape annotation
          - action: keep
            regex: true
            source_labels:
              - __meta_kubernetes_service_annotation_prometheus_io_scrape
          # Target kube-state-metrics service directly
          - action: keep
            source_labels:
              - __meta_kubernetes_service_name
            regex: .*kube-state-metrics.*|.*ksm.*
          # Use prometheus.io/port annotation for port
          - action: replace
            regex: (.+?)(?::\d+)?;(\d+)
            replacement: $1:$2
            source_labels:
              - __address__
              - __meta_kubernetes_service_annotation_prometheus_io_port
            target_label: __address__
          - action: replace
            source_labels:
              - __meta_kubernetes_namespace
            target_label: namespace
          - action: replace
            source_labels:
              - __meta_kubernetes_service_name
            target_label: service
        metric_relabel_configs:
          - action: keep
            regex: kube_deployment_status_replicas|kube_deployment_status_replicas_ready|kube_deployment_status_replicas_available|kube_job_info|kube_node_status_allocatable|kube_node_status_capacity|kube_pod_container_resource_limits|kube_pod_container_resource_requests|kube_pod_container_status_last_terminated_reason|kube_pod_container_status_restarts_total|kube_pod_info|kube_pod_start_time|kube_pod_status_phase|kube_pod_status_ready_time|kube_pod_status_scheduled_time|kube_replicaset_spec_replicas
            source_labels: [__name__]
      # Node Exporter - service endpoint discovery
      - job_name: node-exporter
        scrape_interval: 1m
        honor_labels: true
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          # Target node-exporter service
          - action: keep
            source_labels:
              - __meta_kubernetes_service_name
            regex: .*node-exporter.*
          # Keep only metrics port (from your pod spec)
          - action: keep
            source_labels:
              - __meta_kubernetes_endpoint_port_name
            regex: metrics
          - action: replace
            source_labels:
              - __meta_kubernetes_namespace
            target_label: namespace
          - action: replace
            source_labels:
              - __meta_kubernetes_service_name
            target_label: service
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_node_name
            target_label: node
        metric_relabel_configs:
          - action: keep
            regex: node_memory_MemAvailable_bytes|node_memory_MemFree_bytes|node_memory_MemTotal_bytes|node_network_receive_bytes_total|node_network_transmit_bytes_total|node_cpu_guest_seconds_total|node_cpu_seconds_total|node_disk_io_time_seconds_total|node_disk_io_time_weighted_seconds_total|node_disk_read_bytes_total|node_disk_read_time_seconds_total|node_disk_writes_bytes_total|node_disk_write_time_seconds_total
            source_labels: [__name__]
          - action: drop
            regex: lo
            source_labels: [device]
      # DCGM Exporter for GPU metrics
      - job_name: dcgm-exporter
        scrape_interval: 1m
        honor_labels: true
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - action: keep
            source_labels:
              - __meta_kubernetes_service_name
            regex: .*dcgm.*
          - action: keep
            source_labels:
              - __meta_kubernetes_endpoint_port_name
            regex: metrics
          - action: replace
            source_labels:
              - __meta_kubernetes_namespace
            target_label: namespace
          - action: replace
            source_labels:
              - __meta_kubernetes_service_name
            target_label: service
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_node_name
            target_label: node
        metric_relabel_configs:
          - action: keep
            regex: DCGM_FI_PROF_SM_OCCUPANCY|DCGM_FI_PROF_SM_ACTIVE|DCGM_FI_PROF_DRAM_ACTIVE|DCGM_FI_PROF_PCIE_TX_BYTES|DCGM_FI_PROF_PCIE_RX_BYTES|DCGM_FI_DEV_POWER_USAGE|DCGM_FI_DEV_GPU_TEMP|DCGM_FI_DEV_ENC_UTIL|DCGM_FI_DEV_DEC_UTIL|DCGM_FI_PROF_PIPE_FP64_ACTIVE|DCGM_FI_PROF_PIPE_FP32_ACTIVE|DCGM_FI_PROF_PIPE_FP16_ACTIVE|DCGM_FI_PROF_PIPE_TENSOR_ACTIVE|DCGM_FI_DEV_MEM_COPY_UTIL|DCGM_FI_DEV_FB_USED|DCGM_FI_PROF_GR_ENGINE_ACTIVE|DCGM_FI_DEV_FB_FREE
            source_labels: [__name__]
      # Beyla eBPF observability for network flow metrics
      - job_name: beyla
        scrape_interval: 1m
        honor_labels: true
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Check for prometheus.io/scrape annotation on pod
          - action: keep
            regex: true
            source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_scrape
          # Target beyla pods
          - action: keep
            source_labels:
              - __meta_kubernetes_pod_label_app_kubernetes_io_name
            regex: .*beyla.*
          # Keep only running pods
          - action: keep
            source_labels:
              - __meta_kubernetes_pod_phase
            regex: Running
          # Use prometheus.io/port annotation from pod
          - action: replace
            regex: (.+?)(?::\d+)?;(\d+)
            replacement: $1:$2
            source_labels:
              - __meta_kubernetes_pod_host_ip
              - __meta_kubernetes_pod_annotation_prometheus_io_port
            target_label: __address__
          # Use custom metrics path if specified
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_path
            target_label: __metrics_path__
          - action: replace
            source_labels:
              - __meta_kubernetes_namespace
            target_label: namespace
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_name
            target_label: pod
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_node_name
            target_label: node
        metric_relabel_configs:
          - action: keep
            regex: beyla_network_flow_bytes_total|http_client_request_duration_seconds_count|http_server_request_duration_seconds_count|http_client_request_duration_seconds_bucket|http_server_request_duration_seconds_bucket|http_client_request_duration_seconds_sum|http_server_request_duration_seconds_sum
            source_labels: [__name__]
      # Service endpoints for service mesh and ingress controllers
      - job_name: kubernetes-service-endpoints
        scrape_interval: 1m
        honor_labels: true
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - action: keep
            regex: true
            source_labels:
              - __meta_kubernetes_service_annotation_prometheus_io_scrape
          - action: drop
            regex: true
            source_labels:
              - __meta_kubernetes_service_annotation_prometheus_io_scrape_slow
          # Keep ingress controller services only (Istio sidecar metrics scraped via envoy-sidecar-metrics job)
          - action: keep
            regex: .*nginx.*|.*traefik.*
            source_labels:
              - __meta_kubernetes_service_name
          - action: replace
            regex: (https?)
            source_labels:
              - __meta_kubernetes_service_annotation_prometheus_io_scheme
            target_label: __scheme__
          - action: replace
            regex: (.+)
            source_labels:
              - __meta_kubernetes_service_annotation_prometheus_io_path
            target_label: __metrics_path__
          - action: replace
            regex: (.+?)(?::\d+)?;(\d+)
            replacement: $1:$2
            source_labels:
              - __address__
              - __meta_kubernetes_service_annotation_prometheus_io_port
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_service_annotation_prometheus_io_param_(.+)
            replacement: __param_$1
          - action: labelmap
            regex: __meta_kubernetes_service_label_(.+)
          - action: replace
            source_labels:
              - __meta_kubernetes_namespace
            target_label: namespace
          - action: replace
            source_labels:
              - __meta_kubernetes_service_name
            target_label: service
        metric_relabel_configs:
          - action: keep
            regex: nginx_ingress_controller_requests|nginx_ingress_controller_request_duration_seconds_count|nginx_ingress_controller_request_duration_seconds_sum|traefik_service_requests_total|traefik_service_request_duration_seconds
            source_labels: [__name__]
      # Istio/Envoy sidecar metrics — scraped from pod_ip:15020/stats/prometheus (merged endpoint).
      - job_name: istio-sidecar-metrics
        scrape_interval: 1m
        honor_labels: true
        metrics_path: /stats/prometheus
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - action: keep
            regex: .+
            source_labels:
              - __meta_kubernetes_pod_annotation_sidecar_istio_io_status
          - action: replace
            regex: (.+);(.+)
            replacement: $1:15020
            source_labels:
              - __meta_kubernetes_pod_ip
              - __meta_kubernetes_pod_name
            target_label: __address__
          - action: replace
            source_labels:
              - __meta_kubernetes_namespace
            target_label: namespace
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_name
            target_label: pod
          - action: replace
            source_labels:
              - __meta_kubernetes_pod_node_name
            target_label: node
        metric_relabel_configs:
          - action: keep
            regex: envoy_cluster_upstream_rq_time.*|envoy_cluster_upstream_rq_completed|istio_requests_total|istio_request_duration_milliseconds_count|istio_request_duration_milliseconds_sum|istio_request_duration_milliseconds_bucket
            source_labels: [__name__]
  recording_rules.yml: |
    {}
  rules: |
    {}

{{- end }}
