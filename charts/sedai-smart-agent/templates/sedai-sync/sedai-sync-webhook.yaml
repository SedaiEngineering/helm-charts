{{- if .Values.sedaiSync.enabled }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace "sedai-kube-spec-controller-tls" }}
{{- $caCrt := "" }}
{{- $tlsCrt := "" }}
{{- $tlsKey := "" }}
{{- if $existingSecret }}
{{- $caCrt = index $existingSecret.data "ca.crt" }}
{{- $tlsCrt = index $existingSecret.data "tls.crt" }}
{{- $tlsKey = index $existingSecret.data "tls.key" }}
{{- else }}
{{- $ca := genCA "sedai-kube-spec-controller-ca" 3650 }}
{{- $cert := genSignedCert (printf "sedai-kube-spec-controller-svc.%s" .Release.Namespace) (list) (list (printf "sedai-kube-spec-controller-svc.%s.svc" .Release.Namespace)) 3650 $ca }}
{{- $caCrt = $ca.Cert | b64enc }}
{{- $tlsCrt = $cert.Cert | b64enc }}
{{- $tlsKey = $cert.Key | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: sedai-kube-spec-controller-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- with .Values.globalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.globalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  ca.crt: {{ $caCrt }}
  tls.crt: {{ $tlsCrt }}
  tls.key: {{ $tlsKey }}
type: kubernetes.io/tls

---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: sedai-kube-spec-controller-mutation-webhook
  labels:
    {{- with .Values.globalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.globalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
webhooks:
  - name: sedai-kube-spec-controller-svc.{{ .Release.Namespace }}.svc
    clientConfig:
      service:
        name: sedai-kube-spec-controller-svc
        namespace: {{ .Release.Namespace }}
        path: "/mutate/pod"
        port: 8443
      caBundle: {{ $caCrt }}
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
    failurePolicy: 'Ignore'
    namespaceSelector:
      matchExpressions:
        - key: "kubernetes.io/metadata.name"  # Use the `metadata.name` of the namespace
          operator: NotIn
          values: ["{{ .Release.Namespace }}"]
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: 1
{{- end }}