{{- if or .Values.sedaiSync.enabled .Values.kubeflowSparkOptimization.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Values.workload.kubeSpecController.name }}-svc"
  labels:
    {{- include "sedai-smart-agent.labels" . | nindent 4 }}
    app: "{{ .Values.workload.kubeSpecController.name }}"
    {{- with .Values.globalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.globalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  - name: "api"
    port: 8443
    targetPort: 8443
    protocol: TCP
  selector:
    app: "{{ .Values.workload.kubeSpecController.name }}"
  type: ClusterIP
{{- end }}