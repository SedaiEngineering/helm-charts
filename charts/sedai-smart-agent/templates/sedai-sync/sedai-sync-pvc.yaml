{{- if or .Values.sedaiSync.enabled .Values.kubeflowSparkOptimization.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "{{ .Values.workload.kubeSpecController.name }}-pvc"
  labels:
    {{- include "sedai-smart-agent.labels" . | nindent 4 }}
    app: "{{ .Values.workload.kubeSpecController.name }}"
    {{- with .Values.globalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.globalAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.resources.sedaiSync.storage | default "1Gi" }}
{{- end }}
